services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    container_name: iap-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlruns
    volumes:
      - mlflow_artifacts:/mlruns
      - mlflow_db:/mlflow

  api:
    build: .
    container_name: iap-api
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts

volumes:
  mlflow_artifacts:
  mlflow_db:
